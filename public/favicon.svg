<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="16" fill="#0A0A0A"/>
  
  <path d="M32 12C32 12 20 18 20 28C20 38 32 44 32 44C32 44 44 38 44 28C44 18 32 12 32 12Z" stroke="#C5A059" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  
  <path d="M26 24C26 24 38 22 38 28C38 34 26 32 26 38C26 38 38 40 38 40" stroke="#C5A059" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <animate attributeName="stroke-dasharray" values="0,100;100,0;0,100" dur="4s" repeatCount="indefinite" />
  </path>
  
  <circle cx="32" cy="28" r="3" fill="#FFD700" filter="url(#glow)">
    <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
